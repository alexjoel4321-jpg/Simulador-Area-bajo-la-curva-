<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Simulador del Área Bajo la Curva</title>

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    <!-- MathJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.2.2/math.min.js"></script>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            }
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</head>

<body>

<div class="container">

    <header>

        <h1>Simulador del Área Bajo la Curva</h1>

        <p>
            Visualización de integrales definidas mediante
            aproximaciones numéricas.
        </p>

    </header>

    <section class="panel">

        <div class="controls">

            <h2>Parámetros</h2>

            <label>Función</label>

            <input
                    id="funcion"
                    type="text"
                    value="x^2"
            >

            <label>Límite inferior</label>

            <input
                    id="a"
                    type="number"
                    value="0"
            >

            <label>Límite superior</label>

            <input
                    id="b"
                    type="number"
                    value="3"
            >

            <label>Rectángulos</label>

            <input
                    id="n"
                    type="range"
                    min="2"
                    max="100"
                    value="10"
            >

            <span id="valorN">10</span>

            <label>Método</label>

            <select id="metodo">

                <option value="izquierda">
                    Rectángulo izquierdo
                </option>

                <option value="derecha">
                    Rectángulo derecho
                </option>

                <option value="medio" selected>
                    Punto medio
                </option>

                <option value="trapecio">
                    Trapecio
                </option>

            </select>

            <button id="graficar">
                Graficar
            </button>

            <button id="descargar">
                Descargar gráfica
            </button>

        </div>

        <div class="graph">

            <div id="grafica"></div>

        </div>

    </section>

    <section class="resultados">

        <div class="card">

            <h3>Área aproximada</h3>

            <p id="aprox">0</p>

        </div>

        <div class="card">

            <h3>Área de referencia</h3>

            <p id="exacta">0</p>

        </div>

        <div class="card">

            <h3>Error</h3>

            <p id="error">0%</p>

        </div>

        <div class="card">

            <h3>Δx</h3>

            <p id="deltaX">0</p>

        </div>

<section class="formula">

    <h2>Método utilizado</h2>

    <div id="formulaTexto"></div>

</section>

<section class="tablaDatos">

<h2>Datos de los subintervalos</h2>

<table>

<thead>

<tr>

<th>i</th>

<th>x</th>

<th>f(x)</th>

<th>Área</th>

</tr>

</thead>

<tbody id="tablaBody">

</tbody>

</table>

</section>


    </section>

</div>

<script src="js/script.js"></script>

</body>
</html>
